name: Label & comment issues

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types:
      - opened
      - reopened
      - closed

  pull_request:
    types:
      - opened

jobs:
  label_issues:
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Attach label to issues
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["issue", "fix"]
            })

      - name: Comment on new issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for opening this issue! We'll take a look as soon as possible.

  closed_issue_comment:
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Comment when issue is closed
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            The issue is now resolved.

  first_pr_comment:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: read
      issues: write

    steps:
      - name: Check if this is the user's first PR
        uses: actions/github-script@v8
        with:
          script: |
            const author = context.payload.pull_request.user.login;

            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all"
            });

            const userPRs = pulls.data.filter(
              pr => pr.user.login === author
            );

            if (userPRs.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Congratulations @${author} on opening your first pull request!`
              });
            }
